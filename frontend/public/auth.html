<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kada Auth</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Register dan Login</h1>
      <div class="nav-links">
        <a class="nav-button" href="/">Message Board</a>
        <a class="nav-button" href="/payment.html">Halaman Midtrans</a>
      </div>
      <p><a href="/">Kembali ke message board</a></p>

      <section class="panel">
        <form id="register-form">
          <h2>Register</h2>
          <input name="name" placeholder="Nama" required />
          <input name="email" type="email" placeholder="Email" required />
          <input name="password" type="password" placeholder="Password" required />
          <button type="submit">Register</button>
        </form>
      </section>

      <section class="panel">
        <form id="login-form">
          <h2>Login</h2>
          <input name="email" type="email" placeholder="Email" required />
          <input name="password" type="password" placeholder="Password" required />
          <button type="submit">Login</button>
        </form>
      </section>

      <section class="panel buttons">
        <button id="logout-button" type="button">Logout</button>
        <button id="delete-account-button" type="button">Delete Account</button>
      </section>

      <section class="panel">
        <p id="auth-status"></p>
        <p id="session-box">Belum login.</p>
      </section>
    </main>

    <script src="/config.js"></script>
    <script src="/auth.js"></script>
  </body>
</html>
